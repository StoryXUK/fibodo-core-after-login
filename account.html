<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>fibodo — Account Details</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/account-details.css">
</head>

<body>

  <div id="site-header"></div>

  <main class="account-page">
    <div class="container">

      <h1 class="page-title">Account Details</h1>
      <p class="page-subtitle">View and manage your current user profile</p>

      <div class="profile-hero-card">
        <div class="profile-hero-left">
          <div class="profile-avatar-wrap">
            <img src="images/logo.png" alt="Harmony Yoga">
          </div>
          <div>
            <h2 class="profile-hero-name">James Murphy</h2>
            <p class="profile-hero-label">Member</p>
          </div>
        </div>
        <button class="profile-refresh-btn" aria-label="Refresh profile">
          <svg viewBox="0 0 24 24">
            <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
            <path d="M21 3v6h-6"></path>
          </svg>
        </button>
      </div>

      <div class="account-tabs-card">
        <div class="tabs">
          <a class="tab-btn" href="account-family-members.html">Family Members</a>
          <a class="tab-btn" href="account-bookings-watchlist.html">Bookings / Watchlist</a>
          <a class="tab-btn" href="account-card-details.html">Card Details</a>
          <a class="tab-btn active" href="account-details.html">Details</a>
          <a class="tab-btn" href="account-settings.html">Settings</a>
          <a class="tab-btn" href="account-qr-code.html">QR Code</a>
        </div>

        <div class="tab-panel active">
          <div class="section-header">
            <div>
              <h3 class="section-title">Details</h3>
              <p class="section-subtitle">View and update your personal profile information</p>
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label for="firstName">First name</label>
              <input id="firstName" type="text" value="John">
            </div>
            <div class="form-group">
              <label for="lastName">Last name</label>
              <input id="lastName" type="text" value="Jones">
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input id="email" type="email" value="john@example.com">
            </div>
            <div class="form-group">
              <label for="phone">Phone number</label>
              <input id="phone" type="text" value="+44 7700 900123">
            </div>
            <div class="form-group full">
              <label for="notes">Notes</label>
              <textarea id="notes">Prefers morning classes and email reminders.</textarea>
            </div>
          </div>

          <div class="form-actions">
            <button class="btn btn-primary">Save Changes</button>
            <button class="btn">Cancel</button>
          </div>
        </div>

      </div>
    </div>
  </main>

  <div id="change-password-modal-root"></div>

  <script src="javascript/main.js"></script>
  <script src="javascript/change-password-modal.js"></script>
  <script src="javascript/modal-loader.js"></script>

</body>
</html>
