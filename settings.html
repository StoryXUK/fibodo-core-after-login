<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>fibodo — Settings</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/account-details.css">
</head>

<body>

  <div id="site-header"></div>

  <main class="account-page">
    <div class="container">

      <h1 class="page-title">Account Details</h1>
      <p class="page-subtitle">View and manage your current user profile</p>

      <div class="profile-hero-card">
        <div class="profile-hero-left">
          <div class="profile-avatar-wrap">
            <img src="images/logo.png" alt="Harmony Yoga">
          </div>
          <div>
            <h2 class="profile-hero-name">James Murphy</h2>
            <p class="profile-hero-label">Member</p>
          </div>
        </div>
        <button class="profile-refresh-btn" aria-label="Refresh profile">
          <svg viewBox="0 0 24 24">
            <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
            <path d="M21 3v6h-6"></path>
          </svg>
        </button>
      </div>

      <div class="account-tabs-card">
        

        <div class="tab-panel active">
          <div class="section-header">
            <div>
              <h3 class="section-title">Settings</h3>
              <p class="section-subtitle">Update your communication preferences</p>
            </div>
          </div>

          <div class="settings-toggles">
            <div class="setting-item">
              <div class="setting-row">
                <div>
                  <h4 class="setting-title">Email Notifications</h4>
                  <p class="setting-meta">Receive updates about bookings, reminders and membership changes</p>
                </div>
                <label class="switch">
                  <input type="checkbox" checked>
                  <span class="switch-slider"></span>
                </label>
              </div>
            </div>

            <div class="setting-item">
              <div class="setting-row">
                <div>
                  <h4 class="setting-title">SMS Notifications</h4>
                  <p class="setting-meta">Receive class reminders and important account alerts by text</p>
                </div>
                <label class="switch">
                  <input type="checkbox">
                  <span class="switch-slider"></span>
                </label>
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button class="btn btn-primary">Save Settings</button>
            <button class="btn">Cancel</button>
          </div>
        </div>

      </div>
    </div>
  </main>

  <div id="change-password-modal-root"></div>

  <script src="javascript/main.js"></script>
  <script src="javascript/change-password-modal.js"></script>
  <script src="javascript/modal-loader.js"></script>

</body>
</html>
