<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>fibodo — Wallet</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/nav.css">
  
</head>

<body>

  <div id="site-header"></div>

  <main class="page">
    <div class="page-inner">
      <a href="dashboard.html" class="back-link">
        <svg viewBox="0 0 24 24">
          <path d="M19 12H5"></path>
          <path d="M12 19l-7-7 7-7"></path>
        </svg>
        Go Back
      </a>

      <h1 class="page-title">Wallet</h1>
      <p class="page-subtitle">View your balance and transaction history</p>

      <section class="card">
        <div class="tabs">
          <button class="tab-btn active" data-tab="wallet-tab">Wallet</button>
        </div>

        <div class="tab-panel active" id="wallet-tab">
          <div class="wallet-grid">
            <div class="balance-panel">
              <div class="balance-card">
                <p class="balance-label">Cash credit balance</p>
                <div class="balance-row">
                  <h2 class="balance-amount">£0.00</h2>
                  <span class="active-pill">Active</span>
                </div>
              </div>
            </div>

            <div class="history-panel">
              <div class="history-header">
                <h2 class="section-title">Wallet transaction history</h2>
                <div class="search-wrap">
                  <input type="text" class="search-input" placeholder="Search by Ref ID...">
                </div>
              </div>

              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Ref ID</th>
                      <th>Transaction Date &amp; Time</th>
                      <th>Balance</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td colspan="4" class="table-empty">No transactions found</td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <div class="fake-scrollbar"></div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="javascript/main.js"></script>
  <script src="javascript/change-password-modal.js"></script>
  <script src="javascript/modal-loader.js"></script>

</body>
</html>
