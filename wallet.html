<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>fibodo — Wallet</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/nav.css">
  <style>
    :root {
      --bg: #f3f3f5;
      --panel: #ffffff;
      --panel-soft: #f7f8fa;
      --border: #e6e7eb;
      --text: #111315;
      --muted: #6f7681;
      --primary: #2f80d1;
      --primary-hover: #2671ba;
      --hover: #f6f7f8;
      --shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --max-width: 1280px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
    }

    .page {
      padding: 34px 20px 40px;
    }

    .page-inner {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 14px;
    }

    .back-link svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .page-title {
      font-size: 28px;
      line-height: 1.1;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }

    .page-subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 15px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .tabs {
      display: flex;
      gap: 28px;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      flex-wrap: wrap;
    }

    .tab-btn {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
      padding: 18px 0 14px;
      position: relative;
      cursor: pointer;
    }

    .tab-btn.active {
      color: var(--primary);
    }

    .tab-btn.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 2px;
      background: var(--primary);
      border-radius: 999px;
    }

    .tab-panel {
      display: none;
      padding: 28px 24px 24px;
      min-height: 520px;
    }

    .tab-panel.active {
      display: block;
    }

    .wallet-grid {
      display: grid;
      grid-template-columns: 420px minmax(0, 1fr);
      gap: 24px;
      align-items: start;
    }

    .balance-panel {
      background: #eef1f5;
      border: 1px solid #dde3ea;
      border-radius: 14px;
      min-height: 440px;
      padding: 26px;
    }

    .balance-card {
      border-radius: 12px;
      padding: 22px 18px;
      background: linear-gradient(135deg, #2c3550 0%, #7f8d98 100%);
      color: #fff;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    }

    .balance-label {
      font-size: 18px;
      margin: 0 0 10px;
      font-weight: 500;
    }

    .balance-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .balance-amount {
      font-size: 44px;
      line-height: 1;
      margin: 0;
      font-weight: 500;
      letter-spacing: -0.03em;
    }

    .active-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 8px;
      border-radius: 8px;
      background: #fff;
      color: #26864b;
      font-size: 13px;
      font-weight: 700;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .section-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .search-wrap {
      position: relative;
      width: 100%;
      max-width: 220px;
    }

    .search-input {
      width: 100%;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      padding: 0 14px;
      font-size: 14px;
      color: var(--text);
      outline: none;
    }

    .search-input:focus {
      border-color: #c8d7e6;
      box-shadow: 0 0 0 3px rgba(47, 128, 209, 0.08);
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 620px;
      border-collapse: collapse;
    }

    thead th {
      background: #f5f5f7;
      text-align: left;
      font-size: 14px;
      font-weight: 700;
      padding: 14px 14px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody td {
      padding: 18px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
      vertical-align: middle;
    }

    .table-empty {
      text-align: center;
      color: var(--muted);
      padding: 18px 14px 28px;
    }

    .fake-scrollbar {
      margin-top: 14px;
      height: 16px;
      background: #f2f2f3;
      border-radius: 999px;
      position: relative;
      overflow: hidden;
      border: 1px solid #ededee;
    }

    .fake-scrollbar::after {
      content: "";
      position: absolute;
      left: 2px;
      top: 2px;
      bottom: 2px;
      width: 78%;
      background: #b7b7ba;
      border-radius: 999px;
    }

    @media (max-width: 991px) {
      .wallet-grid {
        grid-template-columns: 1fr;
      }

      .balance-panel {
        min-height: auto;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 24px 16px 32px;
      }

      .page-title {
        font-size: 24px;
      }

      .tabs {
        gap: 22px;
        padding: 0 18px;
      }

      .tab-panel {
        padding: 20px 18px;
      }

      .balance-amount {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>

  <div id="site-header"></div>

  <main class="page">
    <div class="page-inner">
      <a href="dashboard.html" class="back-link">
        <svg viewBox="0 0 24 24">
          <path d="M19 12H5"></path>
          <path d="M12 19l-7-7 7-7"></path>
        </svg>
        Go Back
      </a>

      <h1 class="page-title">Wallet</h1>
      <p class="page-subtitle">View your balance and transaction history</p>

      <section class="card">
        <div class="tabs">
          <button class="tab-btn active" data-tab="wallet-tab">Wallet</button>
        </div>

        <div class="tab-panel active" id="wallet-tab">
          <div class="wallet-grid">
            <div class="balance-panel">
              <div class="balance-card">
                <p class="balance-label">Cash credit balance</p>
                <div class="balance-row">
                  <h2 class="balance-amount">£0.00</h2>
                  <span class="active-pill">Active</span>
                </div>
              </div>
            </div>

            <div class="history-panel">
              <div class="history-header">
                <h2 class="section-title">Wallet transaction history</h2>
                <div class="search-wrap">
                  <input type="text" class="search-input" placeholder="Search by Ref ID...">
                </div>
              </div>

              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Ref ID</th>
                      <th>Transaction Date &amp; Time</th>
                      <th>Balance</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td colspan="4" class="table-empty">No transactions found</td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <div class="fake-scrollbar"></div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const dropdowns = document.querySelectorAll(".profile-dropdown");

    dropdowns.forEach((dropdown) => {
      const toggle = dropdown.querySelector(".profile-toggle");

      toggle.addEventListener("click", function (e) {
        e.stopPropagation();
        dropdowns.forEach((item) => {
          if (item !== dropdown) item.classList.remove("active");
        });
        dropdown.classList.toggle("active");
      });
    });

    document.addEventListener("click", function () {
      dropdowns.forEach((dropdown) => {
        dropdown.classList.remove("active");
      });
    });

    const navToggle = document.getElementById("navToggle");
    const mainNav = document.getElementById("mainNav");
    const navOverlay = document.getElementById("navOverlay");

    if (navToggle) {
      navToggle.addEventListener("click", function () {
        mainNav.classList.toggle("active");
        navOverlay.classList.toggle("active");
      });
    }

    if (navOverlay) {
      navOverlay.addEventListener("click", function () {
        mainNav.classList.remove("active");
        navOverlay.classList.remove("active");
      });
    }
  </script>

  <script src="javascript/main.js"></script>
  <script src="javascript/change-password-modal.js"></script>
  <script src="javascript/modal-loader.js"></script>

</body>
</html>
