<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>fibodo — Contacts</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/nav.css">
  <style>
   

    

    /* PAGE */
    .page {
      padding: 34px 20px 40px;
    }

    .page-inner {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 14px;
    }

    .back-link svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .page-title {
      font-size: 28px;
      line-height: 1.1;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }

    .page-subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 15px;
    }

    .contacts-layout {
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr);
      gap: 24px;
      align-items: start;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .card-body {
      padding: 20px;
    }

    .requests-card .card-body {
      padding: 20px 18px 18px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.01em;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 18px 0 0;
    }

    .mini-tabs {
      display: flex;
      gap: 28px;
      border-bottom: 1px solid var(--border);
      padding: 0 18px;
    }

    .mini-tab {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
      padding: 16px 0 14px;
      position: relative;
      cursor: pointer;
    }

    .mini-tab.active {
      color: var(--primary);
    }

    .mini-tab.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 2px;
      background: var(--primary);
      border-radius: 999px;
    }

    .request-panel {
      display: none;
      padding: 28px 18px 24px;
      min-height: 280px;
      color: var(--muted);
      font-size: 15px;
      text-align: center;
    }

    .request-panel.active {
      display: block;
    }

    .contacts-card {
      overflow: hidden;
    }

    .contacts-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      height: 40px;
      padding: 0 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s ease;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--hover);
    }

    .table-wrap {
      overflow-x: auto;
      padding: 18px 20px 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    thead th {
      background: #f5f5f7;
      text-align: left;
      font-size: 14px;
      font-weight: 700;
      color: #1d1f23;
      padding: 14px 14px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody td {
      padding: 16px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
      color: var(--text);
      vertical-align: middle;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    .contact-person {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 220px;
    }

    .contact-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d1d5db, #9ca3af);
      color: #111827;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .contact-avatar svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .contact-name {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .contact-name:hover {
      text-decoration: underline;
    }

    .table-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
      color: #6d7681;
    }

    .table-icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      color: inherit;
      text-decoration: none;
    }

    .table-icon-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .table-icon-btn.more svg {
      stroke: none;
      fill: currentColor;
      width: 16px;
      height: 16px;
    }

    .table-empty {
      text-align: center;
      color: #969ca6;
      padding: 34px 18px;
      font-size: 16px;
    }

    @media (max-width: 991px) {
      .nav-toggle {
        display: inline-flex;
      }

      .main-nav {
        position: fixed;
        top: 0;
        right: -320px;
        width: 300px;
        height: 100vh;
        background: #fff;
        flex-direction: column;
        align-items: flex-start;
        gap: 0;
        padding: 90px 20px 20px;
        box-shadow: -10px 0 30px rgba(0,0,0,0.08);
        transition: right 0.25s ease;
        z-index: 1001;
        margin-left: 0;
      }

      .main-nav.active {
        right: 0;
      }

      .main-nav > a {
        width: 100%;
        padding: 14px 0;
        border-bottom: 1px solid var(--border);
      }

      .main-nav > a.active::after {
        display: none;
      }

      .nav-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.3);
        z-index: 1000;
      }

      .nav-overlay.active {
        display: block;
      }

      .header-right .header-icon,
      .header-right .profile-dropdown {
        display: none;
      }

      .header-icons--mobile {
        display: flex;
        margin-top: 20px;
      }

      .header-icons--mobile .profile-menu {
        right: auto;
        left: 0;
      }

      .contacts-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .header-inner {
        padding: 0 16px;
      }

      .page {
        padding: 24px 16px 32px;
      }

      .page-title {
        font-size: 24px;
      }

      .contacts-header {
        align-items: flex-start;
      }

      .btn {
        width: 100%;
      }

      .contacts-header .btn {
        width: auto;
      }
    }
  </style>
</head>

<body>

  <div id="site-header"></div>

  <main class="page">
    <div class="page-inner">
      <a href="dashboard.html" class="back-link">
        <svg viewBox="0 0 24 24">
          <path d="M19 12H5"></path>
          <path d="M12 19l-7-7 7-7"></path>
        </svg>
        Go Back
      </a>

      <h1 class="page-title">Contacts</h1>
      <p class="page-subtitle">Add and manage your contacts</p>

      <section class="contacts-layout">
        <aside class="card requests-card">
          <div class="card-body">
            <h2 class="card-title">Requests</h2>
          </div>

          <div class="divider"></div>

          <div class="mini-tabs">
            <button class="mini-tab active" data-request-tab="received">Received</button>
            <button class="mini-tab" data-request-tab="sent">Sent</button>
          </div>

          <div class="request-panel active" id="received">
            No incoming requests
          </div>

          <div class="request-panel" id="sent">
            No sent requests
          </div>
        </aside>

        <section class="card contacts-card">
          <div class="contacts-header">
            <h2 class="card-title">My contacts</h2>
            <a href="#" class="btn">+ Add a contact</a>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Phone</th>
                  <th>Email</th>
                  <th style="width: 110px;"></th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>
                    <div class="contact-person">
                      <span class="contact-avatar">
                        <svg viewBox="0 0 24 24">
                          <circle cx="12" cy="8" r="4"></circle>
                          <path d="M4 20a8 8 0 0 1 16 0"></path>
                        </svg>
                      </span>
                      <a href="#" class="contact-name">James Murphy</a>
                    </div>
                  </td>
                  <td>N/A</td>
                  <td>yoga@story-x.co.uk</td>
                  <td>
                    <div class="table-actions">
                      <a href="messages.html" class="table-icon-btn" aria-label="Message contact">
                        <svg viewBox="0 0 24 24">
                          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                      </a>

                      <a href="#" class="table-icon-btn more" aria-label="More actions">
                        <svg viewBox="0 0 24 24">
                          <circle cx="12" cy="5" r="1.8"></circle>
                          <circle cx="12" cy="12" r="1.8"></circle>
                          <circle cx="12" cy="19" r="1.8"></circle>
                        </svg>
                      </a>
                    </div>
                  </td>
                </tr>

                <!-- Empty state example
                <tr>
                  <td colspan="4" class="table-empty">No contacts found.</td>
                </tr>
                -->
              </tbody>
            </table>
          </div>
        </section>
      </section>
    </div>
  </main>

  <script>
    const dropdowns = document.querySelectorAll(".profile-dropdown");

    dropdowns.forEach((dropdown) => {
      const toggle = dropdown.querySelector(".profile-toggle");

      toggle.addEventListener("click", function (e) {
        e.stopPropagation();

        dropdowns.forEach((item) => {
          if (item !== dropdown) item.classList.remove("active");
        });

        dropdown.classList.toggle("active");
      });
    });

    document.addEventListener("click", function () {
      dropdowns.forEach((dropdown) => {
        dropdown.classList.remove("active");
      });
    });

    const navToggle = document.getElementById("navToggle");
    const mainNav = document.getElementById("mainNav");
    const navOverlay = document.getElementById("navOverlay");

    if (navToggle) {
      navToggle.addEventListener("click", function () {
        mainNav.classList.toggle("active");
        navOverlay.classList.toggle("active");
      });
    }

    if (navOverlay) {
      navOverlay.addEventListener("click", function () {
        mainNav.classList.remove("active");
        navOverlay.classList.remove("active");
      });
    }

    const requestTabs = document.querySelectorAll(".mini-tab");
    const requestPanels = document.querySelectorAll(".request-panel");

    requestTabs.forEach((tab) => {
      tab.addEventListener("click", function () {
        requestTabs.forEach((item) => item.classList.remove("active"));
        requestPanels.forEach((panel) => panel.classList.remove("active"));

        tab.classList.add("active");
        document.getElementById(tab.dataset.requestTab).classList.add("active");
      });
    });
  </script>

  <script src="javascript/main.js"></script>

</body>
</html>
