<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>fibodo — Family Members</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/account-details.css">
</head>

<body>

  <div id="site-header"></div>

  <main class="account-page">
    <div class="container">

      <h1 class="page-title">Account Details</h1>
      <p class="page-subtitle">View and manage your current user profile</p>

      <div class="profile-hero-card">
        <div class="profile-hero-left">
          <div class="profile-avatar-wrap">
            <img src="images/logo.png" alt="Harmony Yoga">
          </div>
          <div>
            <h2 class="profile-hero-name">James Murphy</h2>
            <p class="profile-hero-label">Member</p>
          </div>
        </div>
        <button class="profile-refresh-btn" aria-label="Refresh profile">
          <svg viewBox="0 0 24 24">
            <path d="M21 12a9 9 0 1 1-2.64-6.36"></path>
            <path d="M21 3v6h-6"></path>
          </svg>
        </button>
      </div>

      <div class="account-tabs-card">
        <div class="tabs">
          <a class="tab-btn active" href="account-family-members.html">Family Members</a>
          <a class="tab-btn" href="account-bookings-watchlist.html">Bookings / Watchlist</a>
          <a class="tab-btn" href="account-card-details.html">Card Details</a>
          <a class="tab-btn" href="account-settings.html">Settings</a>
          <a class="tab-btn" href="account-qr-code.html">QR Code</a>
        </div>

        <div class="tab-panel active">
          <div class="section-header">
            <div>
              <h3 class="section-title">Family Members</h3>
              <p class="section-subtitle">Add and manage your friends and family</p>
            </div>
            <a href="#" class="inline-link">
              <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="9"></circle>
                <path d="M12 8v8"></path>
                <path d="M8 12h8"></path>
              </svg>
              Add a family member
            </a>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Status</th>
                  <th>Date of birth</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td colspan="4" class="table-empty">No family members found.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </main>

  <div id="change-password-modal-root"></div>

  <script src="javascript/main.js"></script>
  <script src="javascript/change-password-modal.js"></script>
  <script src="javascript/modal-loader.js"></script>

</body>
</html>
