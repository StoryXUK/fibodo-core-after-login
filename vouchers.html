<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>fibodo — Vouchers</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/nav.css">
  <style>
    :root {
      --bg: #f3f3f5;
      --panel: #ffffff;
      --panel-soft: #f7f8fa;
      --border: #e6e7eb;
      --text: #111315;
      --muted: #6f7681;
      --primary: #2f80d1;
      --primary-hover: #2671ba;
      --hover: #f6f7f8;
      --shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --max-width: 1280px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
    }

    .page {
      padding: 34px 20px 40px;
    }

    .page-inner {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 14px;
    }

    .back-link svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .page-title {
      font-size: 28px;
      line-height: 1.1;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }

    .page-subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 15px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .tabs {
      display: flex;
      gap: 28px;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      flex-wrap: wrap;
    }

    .tab-btn {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
      padding: 18px 0 14px;
      position: relative;
      cursor: pointer;
    }

    .tab-btn.active {
      color: var(--primary);
    }

    .tab-btn.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 2px;
      background: var(--primary);
      border-radius: 999px;
    }

    .tab-panel {
      display: none;
      padding: 28px 24px 24px;
      min-height: 460px;
    }

    .tab-panel.active {
      display: block;
    }

    .voucher-section {
      margin-bottom: 40px;
    }

    .voucher-section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 18px;
      letter-spacing: -0.01em;
    }

    .voucher-list {
      display: grid;
      gap: 14px;
    }

    .voucher-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      background: #fff;
    }

    .voucher-main {
      min-width: 0;
    }

    .voucher-title {
      font-size: 17px;
      font-weight: 700;
      margin: 0 0 8px;
    }

    .voucher-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .voucher-meta span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .voucher-meta svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    .voucher-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-pill.pending {
      background: #e9f3fd;
      color: #2469ae;
    }

    .status-pill.used {
      background: #edf6ef;
      color: #2f7b45;
    }

    .status-pill.expired {
      background: #f5f5f6;
      color: #6b7280;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      height: 40px;
      padding: 0 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s ease;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--hover);
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .empty-state {
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .empty-pill {
      color: var(--text);
      font-size: 18px;
      font-weight: 500;
    }

    @media (max-width: 991px) {
      .voucher-item {
        grid-template-columns: 1fr;
      }

      .voucher-actions {
        justify-content: flex-start;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 24px 16px 32px;
      }

      .page-title {
        font-size: 24px;
      }

      .tabs {
        gap: 22px;
        padding: 0 18px;
      }

      .tab-panel {
        padding: 20px 18px;
      }
    }
  </style>
</head>

<body>

  <div id="site-header"></div>

  <main class="page">
    <div class="page-inner">
      <a href="dashboard.html" class="back-link">
        <svg viewBox="0 0 24 24">
          <path d="M19 12H5"></path>
          <path d="M12 19l-7-7 7-7"></path>
        </svg>
        Go Back
      </a>

      <h1 class="page-title">Vouchers</h1>
      <p class="page-subtitle">View and manage your voucher activity</p>

      <section class="card">
        <div class="tabs">
          <button class="tab-btn active" data-tab="redeemed">Yet to be redeemed</button>
          <button class="tab-btn" data-tab="utilised">Utilised</button>
          <button class="tab-btn" data-tab="expired">Expired</button>
        </div>

        <div class="tab-panel active" id="redeemed">
          <section class="voucher-section">
            <h2 class="section-title">Yet to be redeemed (0)</h2>
            <div class="empty-state">
              <div class="empty-pill">No vouchers to redeem.</div>
            </div>
          </section>
        </div>

        <div class="tab-panel" id="utilised">
          <section class="voucher-section">
            <h2 class="section-title">Utilised (0)</h2>
            <div class="empty-state">
              <div class="empty-pill">No utilised vouchers found.</div>
            </div>
          </section>
        </div>

        <div class="tab-panel" id="expired">
          <section class="voucher-section">
            <h2 class="section-title">Expired (0)</h2>
            <div class="empty-state">
              <div class="empty-pill">No expired vouchers found.</div>
            </div>
          </section>
        </div>
      </section>
    </div>
  </main>

  <script>
    const dropdowns = document.querySelectorAll(".profile-dropdown");

    dropdowns.forEach((dropdown) => {
      const toggle = dropdown.querySelector(".profile-toggle");

      toggle.addEventListener("click", function (e) {
        e.stopPropagation();

        dropdowns.forEach((item) => {
          if (item !== dropdown) item.classList.remove("active");
        });

        dropdown.classList.toggle("active");
      });
    });

    document.addEventListener("click", function () {
      dropdowns.forEach((dropdown) => {
        dropdown.classList.remove("active");
      });
    });

    const navToggle = document.getElementById("navToggle");
    const mainNav = document.getElementById("mainNav");
    const navOverlay = document.getElementById("navOverlay");

    if (navToggle) {
      navToggle.addEventListener("click", function () {
        mainNav.classList.toggle("active");
        navOverlay.classList.toggle("active");
      });
    }

    if (navOverlay) {
      navOverlay.addEventListener("click", function () {
        mainNav.classList.remove("active");
        navOverlay.classList.remove("active");
      });
    }

    const tabButtons = document.querySelectorAll(".tab-btn");
    const tabPanels = document.querySelectorAll(".tab-panel");

    tabButtons.forEach((button) => {
      button.addEventListener("click", () => {
        tabButtons.forEach((btn) => btn.classList.remove("active"));
        tabPanels.forEach((panel) => panel.classList.remove("active"));

        button.classList.add("active");
        document.getElementById(button.dataset.tab).classList.add("active");
      });
    });
  </script>

</body>
</html>
