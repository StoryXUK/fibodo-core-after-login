<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>fibodo — Vouchers</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/modal.css">
</head>

<body>

  <div id="site-header"></div>

  <main class="page">
    <div class="page-inner">

      <a href="dashboard.html" class="back-link">
        <svg viewBox="0 0 24 24">
          <path d="M19 12H5"></path>
          <path d="M12 19l-7-7 7-7"></path>
        </svg>
        Go Back
      </a>

      <h1 class="page-title">Vouchers</h1>
      <p class="page-subtitle">View and manage your voucher activity</p>

      <section class="card">
        <div class="tabs">
          <button class="tab-btn active" data-tab="redeemed">Yet to be redeemed</button>
          <button class="tab-btn" data-tab="utilised">Utilised</button>
          <button class="tab-btn" data-tab="expired">Expired</button>
        </div>

        <div class="tab-panel active" id="redeemed">
          <div class="panel-header">
            <h2 class="panel-title">Yet to be redeemed</h2>
          </div>
          <div class="empty-state">
            <div class="empty-pill">No vouchers to redeem</div>
          </div>
        </div>

        <div class="tab-panel" id="utilised">
          <div class="panel-header">
            <h2 class="panel-title">Utilised</h2>
          </div>
          <div class="empty-state">
            <div class="empty-pill">No utilised vouchers</div>
          </div>
        </div>

        <div class="tab-panel" id="expired">
          <div class="panel-header">
            <h2 class="panel-title">Expired</h2>
          </div>
          <div class="empty-state">
            <div class="empty-pill">No expired vouchers</div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <div id="change-password-modal-root"></div>

  <script src="javascript/main.js"></script>
  <script src="javascript/change-password-modal.js"></script>
  <script src="javascript/modal-loader.js"></script>

</body>
</html>
